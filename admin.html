<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Tradies 4 AI</title>
  <link rel="icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--orange:#FF6A00;--ink:#1A1B1E;--muted:#8a8f99;--bg:#F4F2EE;--card:#fff;--line:#E7E3DC;--green:#27AE60;--red:#E5484D}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
    h1{font-size:22px;font-weight:900;margin:0}
    .brand span{color:var(--orange)}
    .btn{font-family:inherit;font-weight:800;border:none;border-radius:12px;padding:11px 16px;cursor:pointer;font-size:15px}
    .btn-ghost{background:#fff;border:2px solid var(--line);color:var(--ink)}
    .btn-danger{background:#fff;border:2px solid var(--red);color:var(--red)}
    .btn-sm{padding:6px 10px;font-size:13px;border-radius:9px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
    .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center}
    .stat .n{font-size:22px;font-weight:900;color:var(--orange)}
    .stat .l{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
    h2{font-size:16px;font-weight:900;margin:22px 0 10px}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
    th,td{text-align:left;padding:10px 12px;font-size:14px;border-bottom:1px solid var(--line)}
    th{background:#faf8f5;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
    tr:last-child td{border-bottom:none}
    td.r,th.r{text-align:right;white-space:nowrap}
    .pill{background:#f1eee8;border-radius:20px;padding:2px 9px;font-weight:800;font-size:13px}
    .muted{color:var(--muted);font-weight:700}
    .danger-zone{margin-top:26px;border:2px dashed #f0c4c4;border-radius:16px;padding:16px;background:#fffafa}
    .danger-zone h2{color:var(--red);margin-top:0}
    .danger-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .empty{text-align:center;color:var(--muted);font-weight:700;padding:20px}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-weight:800;font-size:14px;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center}
    .toast.show{opacity:1}
    #loading{text-align:center;color:var(--muted);font-weight:800;padding:60px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toprow">
      <h1 class="brand">📊 Tradies <span>4</span> AI — Admin</h1>
      <button class="btn btn-ghost btn-sm" id="refresh">↻ Refresh</button>
    </div>

    <div id="loading">Loading your dashboard…</div>
    <div id="dash" style="display:none">
      <div class="stats" id="stats"></div>
      <h2>🏆 Leaderboard <span class="muted" id="lb-count"></span></h2>
      <div id="lb"></div>
      <h2>💡 Ideas board <span class="muted" id="idea-count"></span></h2>
      <div id="ideas"></div>
      <div class="danger-zone">
        <h2>⚠️ Admin actions</h2>
        <div class="danger-row">
          <button class="btn btn-danger btn-sm" id="reset-lb">Reset leaderboard (wipe all scores)</button>
          <button class="btn btn-ghost btn-sm" id="change-pass">Change action passcode</button>
        </div>
        <p class="muted" style="font-size:13px;margin-bottom:0">These ask for your passcode (so randoms can't grief your board). Ideas are kept when you reset.</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const sb = supabase.createClient(window.CONFIG.SUPABASE_URL, window.CONFIG.SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

    // Passcode is only needed for destructive actions. Cache it for this page session
    // once entered correctly, so you don't retype it for each action.
    let actionPass = '';
    function needPass(){
      if (actionPass) return actionPass;
      const p = prompt('Enter your admin passcode to confirm:');
      return p ? p.trim() : '';
    }
    async function doAction(fn, args, okMsg){
      const p = needPass(); if (!p) return;
      try {
        const { data, error } = await sb.rpc(fn, Object.assign({ p_pass: p }, args));
        if (error) throw error;
        actionPass = p;               // remember good passcode for this session
        toast(okMsg); load();
        return data;
      } catch (e){
        if (String(e.message).includes('passcode')) { actionPass=''; toast('Wrong passcode'); }
        else toast('Failed: ' + e.message);
      }
    }

    async function load(){
      try {
        const { data, error } = await sb.rpc('admin_overview', { p_pass: '' });
        if (error) throw error;
        $('loading').style.display = 'none';
        $('dash').style.display = 'block';
        render(data);
      } catch (e){
        $('loading').textContent = 'Couldn’t load — check your connection. (' + e.message + ')';
      }
    }

    function render(d){
      const s = d.stats;
      $('stats').innerHTML = [
        ['Tradies', s.tradies],['Total XP', s.total_xp],['Active today', s.active_today],
        ['Ideas', s.ideas],['Votes', s.votes]
      ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

      const lb = d.leaderboard || [];
      $('lb-count').textContent = `(${lb.length})`;
      $('lb').innerHTML = lb.length ? `<table><thead><tr>
          <th>#</th><th></th><th>Name</th><th>Trade</th><th class="r">XP</th><th class="r">🔥</th><th class="r">Last seen</th><th></th>
        </tr></thead><tbody>${lb.map((p,i)=>`<tr>
          <td>${i+1}</td><td>${esc(p.avatar||'🦺')}</td>
          <td><b>${esc(p.display_name)}</b></td><td class="muted">${esc(p.trade||'')}</td>
          <td class="r"><b>${p.total_xp}</b></td><td class="r">${p.current_streak||0}</td>
          <td class="r muted">${p.last_active||'—'}</td>
          <td class="r"><button class="btn btn-ghost btn-sm" data-del-profile="${esc(p.display_name)}">remove</button></td>
        </tr>`).join('')}</tbody></table>` : `<div class="card empty">No tradies on the board yet — share the app link!</div>`;

      const ideas = d.ideas || [];
      $('idea-count').textContent = `(${ideas.length})`;
      $('ideas').innerHTML = ideas.length ? `<table><thead><tr>
          <th class="r">Votes</th><th>Topic</th><th></th>
        </tr></thead><tbody>${ideas.map(it=>`<tr>
          <td class="r"><span class="pill">${it.votes}</span></td>
          <td>${esc(it.text)}</td>
          <td class="r"><button class="btn btn-ghost btn-sm" data-del-idea="${it.id}">delete</button></td>
        </tr>`).join('')}</tbody></table>` : `<div class="card empty">No ideas yet.</div>`;

      document.querySelectorAll('[data-del-idea]').forEach(b=>b.onclick=()=>{
        if(confirm('Delete this idea?')) doAction('admin_delete_suggestion', { p_id: b.dataset.delIdea }, 'Idea deleted');
      });
      document.querySelectorAll('[data-del-profile]').forEach(b=>b.onclick=()=>{
        const nm=b.dataset.delProfile;
        if(confirm(`Remove "${nm}" from the leaderboard?`)) doAction('admin_delete_profile', { p_name: nm }, 'Removed');
      });
    }

    $('refresh').onclick = load;
    $('reset-lb').onclick = ()=>{
      if(confirm('Wipe the WHOLE leaderboard? Everyone’s scores reset to zero. (Ideas are kept.)'))
        doAction('admin_reset_leaderboard', {}, 'Leaderboard reset');
    };
    $('change-pass').onclick = async()=>{
      const cur = needPass(); if(!cur) return;
      const np = prompt('New passcode (min 6 characters):');
      if(!np) return;
      try {
        const { error } = await sb.rpc('admin_set_passcode', { p_pass: cur, p_new: np.trim() });
        if (error) throw error;
        actionPass = np.trim(); toast('Passcode changed ✓');
      } catch(e){ actionPass=''; toast(String(e.message).includes('passcode')?'Wrong current passcode':'Failed: '+e.message); }
    };

    load();
  </script>
</body>
</html>
